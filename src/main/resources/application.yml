server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:~/test;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  thymeleaf:
    cache: false
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update # JPA 테이블 자동생성 (개발용)
    show-sql: true
    properties:
      hibernate:
        format_sql: true # SQL 로그 포맷팅