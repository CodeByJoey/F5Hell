server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:~/test;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  thymeleaf:
    cache: false
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: update # JPA 테이블 자동생성 (개발용)
    properties:
      hibernate:
        format_sql: true # SQL 로그 포맷팅

logging:
  level:
    root: INFO
    com.f5hell: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

file:
  dir: "C:/upload/"