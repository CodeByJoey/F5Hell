<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <title>상품 상세 - F5Hell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <script th:src="@{/js/common.js}"></script>
</head>
<body>

<th:block th:replace="~{layout/fragments/header :: header}" />

<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-center py-5">
                <h4>상품 상세</h4>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
                <div>
                    <label class="col-form-label" th:text="#{product.name}">상품명</label>
                    <input type="text" class="form-control" th:field="${product.name}" disabled>
                </div>

                <div>
                    <label class="col-form-label" th:text="#{product.category}">카테고리</label>
                    <select class="form-control" disabled>
                        <option th:value="${product.categoryId}" th:text="${product.categoryName}"></option>
                    </select>
                </div>

                <div>
                    <label th:for="price" th:text="#{product.price}">가격</label>
                    <input type="number" class="form-control" th:field="${product.price}" disabled>
                </div>

                <div>
                    <label th:for="stock" th:text="#{product.stock}">재고</label>
                    <input type="number" class="form-control" th:field="${product.stock}" disabled>
                </div>

                <div class="d-flex gap-2 justify-content-end py-3">
                    <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post">
                        <button class="btn btn-danger" type="submit" th:text="#{product.delete.button}">삭제</button>
                    </form>
                    <a class="btn btn-primary" th:href="@{/products/update/{id}(id=${product.id})}" th:text="#{product.update.button}">수정</a>
                    <a class="btn btn-light" th:href="@{/products/getList}" th:text="#{product.list.button}">목록</a>
                </div>
        </div>
    </div>

</div>
</body>
</html>
