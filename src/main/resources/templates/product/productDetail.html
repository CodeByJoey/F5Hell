<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <title>상품 상세 - F5Hell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <script th:src="@{/js/common.js}"></script>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-center py-5">
                <h4>상품 상세</h4>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <form th:action="@{/products/create}" th:object="${product}" method="post">
                <div>
                    <label class="col-form-label" th:for="name" th:text="#{product.name}">상품명</label>
                    <input type="text" class="form-control" th:field="*{name}" disabled
                           th:classappend="${#fields.hasErrors('name')} ? 'field-error' : ''">
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div>
                    <label th:for="price" th:text="#{product.price}">가격</label>
                    <input type="number" class="form-control" th:field="*{price}" disabled
                           th:classappend="${#fields.hasErrors('price')} ? 'field-error' : ''">
                    <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
                </div>

                <div>
                    <label th:for="stock" th:text="#{product.stock}">재고</label>
                    <input type="number" class="form-control" th:field="*{stock}" disabled
                           th:classappend="${#fields.hasErrors('stock')} ? 'field-error' : ''">
                    <p th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></p>
                </div>

                <div class="d-flex gap-2 justify-content-end py-3">
                    <a class="btn btn-primary" th:href="@{/products/update/{id}(id=${product.id})}" th:text="#{product.update.button}">상품 수정</a>
                    <a class="btn btn-light" th:href="@{/products/getList}" th:text="#{product.list.button}">목록</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
