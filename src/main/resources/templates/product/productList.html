<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <title>상품 등록 - F5Hell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:inline="javascript">
        console.log([[${products}]]);
    </script>
    <style>
        a {
            color:black;

        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-center py-5">
                <h4>상품 목록</h4>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-end">
                <a class="btn btn-primary" th:href="@{/products/create}">등록</a>
            </div>
        </div>
    </div>

    <div class="row py-3">
        <div class="col-12 col-md-6 col-lg-4 py-2" th:each="product: ${products}">
            <div class="card">
                <h5 th:text="${product.name}">상품명</h5>
                <p>설명입니다</p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="d-flex justify-content-center">
            <nav aria-label="페이지 네비게이션">
                <ul class="pagination" th:with="start=${(products.number / 5) * 5}, end=${(products.number / 5 + 1) * 5 - 1}, last=${end == products.totalPages}">
                    <li class="page-item" th:classappend="${products.first}? 'disabled'">
                        <a class="page-link" th:href="@{/products/getList(page=${0})}" aria-label="이전">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${products.first}? 'disabled'">
                        <a class="page-link" th:href="@{/products/getList(page=${products.number - 1})}">&lt;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(start, (last ? products.totalPages - 1 : end))}">
                        <a class="page-link" th:href="@{/products/getList(page=${i})}" th:classappend="${products.number == i}? 'active'" th:text="${i+1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${products.last}? 'disabled'">
                        <a class="page-link" th:href="@{/products/getList(page=${products.number + 1})}">&gt;</a>
                    </li>
                    <li class="page-item" th:classappend="${products.last}? 'disabled'">
                        <a class="page-link" th:href="@{/products/getList(page=${products.totalPages - 1})}" aria-label="다음">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
