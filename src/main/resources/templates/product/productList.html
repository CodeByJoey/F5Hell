<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <title>상품 등록 - F5Hell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-center p-5">
                <h4>상품 목록</h4>
            </div>
            <div class="d-flex justify-content-end">
                <a class="btn btn-primary" th:href="@{/products/create}">등록</a>
            </div>
            <table class="table">
                <form th:action="@{/products/getList}">
                    <tr>
                        <th>상품명</th>
                        <th>가격</th>
                        <th>재고</th>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.name}">스투시 반팔티</td>
                        <td th:text="${product.price}">1000원</td>
                        <td th:text="${product.stock}">5개</td>
                    </tr>
                </form>
            </table>
        </div>
    </div>
</div>
</body>
</html>
